author: "EnderMage99"
delete-after: True
changes:
  - rscadd: "Association Rework — new squad registration, EXP/skill tree progression, and contract system for Fixer associations."
  - rscadd: "Seven Association fully implemented with 18 skills across 3 branches (Analyst, Coordinator, Operative), 11 investigation toolkit items, 2 unique contract types, and Section 4 weapons."
  - rscadd: "Zwei Association fully implemented with 18 skills across 3 branches (Guardian, Territory, Client). DLU-based defense economy with ward designation, area control, and bodyguard mechanics."
  - rscadd: "Dieci Association fully implemented with 18 skills across 3 branches (Scholar, Warden, Sage). Knowledge system with Sacred Tome, Shield HP component, combo weapon finishers, director events, and charity items."
  - rscadd: "Contract system with 10 contract types (Escort Person, Eliminate Target, Patrol Route, Investigate Person, Surveillance Post, Guard Area, Protect Person, Host Event, Medical Relief, Tend Person), Hana contract terminal, and contract paper items."
  - rscadd: "Distress emergency system — squad alert with directional spark arrows when a fixer is critically wounded or killed by a player."
  - rscadd: "New status effects — Defense/Offense Level Up & Down, Poise, Concentration, Sinking, Rupture, Fragile, Feeble, Strength, Protection."
  - rscadd: "Stacking status effects now display 10x10 overhead icons with stack count numbers. Configurable via Status Effect Display preference (Disabled / Only Effects / Enabled)."
  - rscadd: "13 Ruin Relics — attunement-based artifacts with unique abilities (blood absorption, invisible allies, damage absorption, scrying, corruption, and more)."
  - rscadd: "Sea Terrors mob pack — 4 mob types with Nethersea Crack spawners, spreading Nethersea Brand ground hazards, and Nervous Impairment stacking debuff."
  - rscadd: "Porous Hand Mermaids — Sinking-focused mobs with symbiotic death mechanics."
  - rscadd: "Night in the Backstreets — newscaster alerts during the city day-night cycle's dark phase."
  - rscadd: "City Law Book — Hana Association legal reference with crime severity tiers and court procedures."
  - rscadd: "Door Lock Display — configurable airlock lock machinery with countdown timer."
  - rscadd: "13 new TGUI interfaces for skill trees, contracts, investigation tools, city maps, knowledge management, and tome."
  - rscadd: "Section 4 Dieci weapons (Fists + Keys) with knowledge-powered combo system and 6 finishers."
  - rscadd: "Section 4 Seven weapons with Rupture mechanic and adaptive damage types."
  - rscadd: "New city areas with map_color support for city map display (Hana Office, bars, library, ruins, lake, and more)."
  - imageadd: "New sprites for Seven Section 4 weapons/armor and Dieci key sprites by zeratino, Dieci mook armor by amanitaspooder, sea terror mobs, ruin relics, status effect icons, association skill tree HUD icons, BDragon1727 effects."